document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

em-ui,-apple-system,\"Segoe UI\",sans-serif;\n  }\n  *{box-sizing:border-box;}\n  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\n  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;}\n  h1,h2,h3,h4,p{margin:0;}\n  button{font-family:inherit;cursor:pointer;border:0;background:none;}\n  .container{max-width:1160px;margin:0 auto;padding:0 28px;}\n\n  /* ---------- Header ---------- */\n  .site-header{background:var(--ink);color:#fff;border-bottom:1px solid rgba(255,255,255,.12);}\n  .hdr-inner{display:flex;align-items:center;gap:20px;height:64px;}\n  .logo{display:flex;align-items:center;flex:none;}\n  .logo svg{height:30px;width:auto;display:block;}\n  .site-nav{display:flex;gap:18px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,.82);}\n  .site-nav span{cursor:pointer;white-space:nowrap;}\n  .site-nav span:hover{color:#fff;}\n  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}\n  .hdr-ic{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;background:transparent;transition:.15s;}\n  .hdr-ic:hover{background:rgba(255,255,255,.08);}\n  .hdr-ic svg{width:20px;height:20px;display:block;}\n  .hdr-lang{display:flex;align-items:center;gap:7px;color:#fff;font-weight:600;font-size:14px;cursor:pointer;background:transparent;padding:8px 6px;border-radius:10px;transition:.15s;}\n  .hdr-lang:hover{background:rgba(255,255,255,.08);}\n  .hdr-lang svg{width:18px;height:18px;display:block;}\n  .hdr-div{width:1px;height:28px;background:rgba(255,255,255,.16);margin:0 2px;}\n  .hdr-profile{width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:.15s;}\n  .hdr-profile:hover{background:rgba(255,255,255,.16);}\n  .hdr-profile svg{width:20px;height:20px;display:block;}\n  .btn-login{background:var(--accent);color:#fff;border-radius:12px;padding:9px 18px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:.15s;white-space:nowrap;margin-left:4px;}\n  .btn-login:hover{background:var(--accent-2);}\n\n  /* ---------- Search card ---------- */\n  .search-card{background:var(--surface);border:1px solid var(--line-card);border-radius:var(--r-xl);box-shadow:var(--sh-md);padding:22px;margin-top:26px;}\n  .route-row{display:grid;grid-template-columns:1fr 40px 1fr 190px 44px;gap:12px;align-items:center;}\n  .route-row + .route-row{margin-top:12px;}\n  .field-in{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 18px;font-weight:700;color:var(--ink);font-size:15px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;transition:.15s;}\n  .field-in:hover{border-color:var(--ink);}\n  .field-in .code{color:var(--muted);font-weight:700;font-size:12.5px;letter-spacing:.06em;}\n  .arrow{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;}\n  .field-in.date .chev{color:var(--muted);font-size:12px;}\n  .del-btn{width:44px;height:46px;border-radius:var(--r-md);background:var(--bg);border:1px solid var(--line);color:var(--accent);display:flex;align-items:center;justify-content:center;}\n  .del-btn svg{width:20px;height:20px;display:block;}\n  .del-btn:hover{color:var(--accent);border-color:var(--accent);}\n  .search-foot{display:flex;align-items:center;gap:14px;margin-top:16px;flex-wrap:wrap;}\n  .add-dir{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--ink);font-size:14px;}\n  .add-dir .plus{width:24px;height:24px;border-radius:var(--r-pill);border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1;}\n  .search-foot .spacer{flex:1;}\n  .mini-field{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-md);padding:12px 16px;font-weight:700;color:var(--ink);font-size:14px;display:flex;align-items:center;gap:8px;}\n  .mini-field.muted{color:var(--muted);font-weight:600;}\n  .btn{font-family:var(--font);font-weight:700;font-size:15px;border-radius:var(--r-md);padding:14px 26px;display:inline-flex;align-items:center;gap:9px;line-height:1;transition:.15s;}\n  .btn-accent{background:var(--accent);color:#fff;}\n  .btn-accent:hover{background:var(--accent-2);}\n  .btn-ink{background:var(--ink);color:#fff;}\n  .btn-ink:hover{background:var(--ink-soft);}\n\n  /* ---------- Trip summary ---------- */\n  .summary{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;}\n  .sum-card{background:var(--surface-2);border:1px solid #ecdcd6;border-radius:var(--r-lg);padding:18px 22px;display:flex;gap:18px;align-items:stretch;}\n  .sum-tab{flex:none;border-right:1px solid #e4cfc8;padding-right:18px;color:var(--muted);font-size:12px;font-weight:700;line-height:1.3;display:flex;flex-direction:column;justify-content:center;text-transform:uppercase;letter-spacing:.08em;}\n  .sum-tab b{display:block;color:var(--ink);font-size:20px;letter-spacing:-.01em;}\n  .sum-body{flex:1;}\n  .sum-body .rt{font-weight:800;font-size:18px;color:var(--ink);}\n  .sum-body .st{color:var(--muted);font-size:13.5px;margin-top:2px;}\n  .sum-body .pr{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-top:12px;}\n  .sum-body .pr .lab{color:var(--muted);font-size:12.5px;}\n  .sum-body .pr .amt{font-weight:800;color:var(--ink);font-size:17px;white-space:nowrap;}\n\n  /* selected summary (after a fare is chosen) */\n  .sum-card.selected{background:var(--surface);border-color:var(--line-card);box-shadow:var(--sh-sm);}\n  .sum-card.selected .sum-tab{border-right-color:var(--line);}\n  .sum-sel{position:relative;flex:1;padding-right:124px;}\n  .sum-sel .head{display:flex;align-items:center;gap:9px;flex-wrap:nowrap;white-space:nowrap;}\n  .sum-sel .rt2{font-weight:800;font-size:16px;color:var(--ink);white-space:nowrap;}\n  .sum-sel .marks{display:flex;}\n  .sum-sel .marks .air-ic{width:21px;height:21px;font-size:10px;}\n  .sum-sel .marks .air-ic + .air-ic{margin-left:-6px;}\n  .sum-sel .fno{font-weight:700;font-size:14px;color:var(--ink);white-space:nowrap;}\n  .sum-sel .line1{margin-top:9px;font-size:14px;color:var(--ink);}\n  .sum-sel .line1 b{font-weight:800;}\n  .sum-sel .line1 .ap{color:var(--muted);font-weight:700;font-size:12.5px;letter-spacing:.05em;}\n  .sum-sel .line1 .gap{display:inline-block;width:26px;}\n  .sum-sel .line2,.sum-sel .line3{color:var(--muted);font-size:12.5px;margin-top:4px;}\n  .sum-sel .edit{position:absolute;top:0;right:0;width:30px;height:30px;border-radius:var(--r-pill);background:var(--bg);border:1px solid var(--line);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:13px;}\n  .sum-sel .edit:hover{border-color:var(--ink);}\n  .sum-sel .rightcol{position:absolute;right:0;bottom:0;text-align:right;}\n  .sum-sel .clsbadge{font-weight:800;font-size:14px;color:var(--accent);}\n  .sum-sel .icons{display:flex;gap:6px;justify-content:flex-end;margin-top:9px;}\n  .sum-sel .icons svg{width:17px;height:17px;}\n\n  /* ---------- Results head ---------- */\n  .results-head{display:flex;align-items:center;gap:16px;margin:40px 0 18px;flex-wrap:wrap;}\n  .results-head h1{font-weight:800;font-size:32px;letter-spacing:-.015em;color:var(--ink);line-height:1.05;}\n  .info-link{display:inline-flex;align-items:center;gap:8px;color:var(--accent);font-weight:700;font-size:14px;margin-left:auto;}\n  .info-link svg{width:18px;height:18px;flex:none;display:block;}\n\n  /* ---------- Date strip ---------- */\n  .date-strip{display:flex;align-items:stretch;gap:10px;}\n  .date-nav{width:48px;flex:none;background:var(--surface);border:1px solid var(--line-card);border-radius:var(--r-md);color:var(--ink);font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm);}\n  .date-nav:hover{border-color:var(--ink);}\n  .date-track{flex:1;display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}\n  .date-cell{background:var(--bg-2);border:1px solid transparent;border-radius:var(--r-md);padding:12px 10px;text-align:center;transition:.15s;}\n  .date-cell .d{font-weight:800;font-size:14px;color:var(--ink);}\n  .date-cell .p{font-size:11.5px;color:var(--muted);margin-top:7px;}\n  .date-cell:not(.is-disabled):hover{border-color:var(--ink);}\n  .date-cell.is-active{background:var(--accent);}\n  .date-cell.is-active .d{color:#fff;}\n  .date-cell.is-active .p{color:rgba(255,255,255,.85);}\n  .date-cell.is-disabled{opacity:.55;cursor:not-allowed;}\n  .date-cell.is-disabled .p{color:var(--accent);font-weight:600;}\n\n  /* ---------- Filter bar ---------- */\n  .filter-bar{display:flex;align-items:center;margin:22px 0 14px;gap:12px;}\n  .filter-note{color:var(--muted);font-size:13px;}\n  .filter-bar .spacer{flex:1;}\n  .chip{font-weight:700;font-size:13.5px;padding:10px 18px;border-radius:var(--r-pill);border:1px solid var(--line);background:var(--surface);color:var(--ink);display:inline-flex;align-items:center;gap:8px;transition:.15s;}\n  .chip:hover{border-color:var(--ink);}\n  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}\n  .chip .chev{font-size:11px;opacity:.7;}\n\n  /* ---------- Sort dropdown ---------- */\n  .sort-wrap{position:relative;}\n  .sort-menu{position:absolute;right:0;top:calc(100% + 10px);width:308px;background:var(--surface);border:1px solid var(--line-card);border-radius:var(--r-lg);box-shadow:var(--sh-lg);padding:18px 20px 18px;z-index:40;display:none;}\n  .sort-menu.open{display:block;opacity:1;animation:sortpop .15s ease;}\n  @keyframes sortpop{from{transform:translateY(-6px)}to{transform:none}}\n  .sort-grp{margin-top:15px;}\n  .sort-grp:first-child{margin-top:0;}\n  .sort-grp .gh{font-weight:800;font-size:12.5px;color:var(--ink);margin-bottom:7px;}\n  .sort-opt{display:flex;align-items:center;gap:11px;padding:5px 0;cursor:pointer;font-size:13.5px;color rn');\n    window.scrollTo({top:0,behavior:'smooth'});\n  }\n  function backToOutbound(){\n    window.leg='outbound';\n    document.getElementById('resHeading').textContent='Выберите рейс из Ташкента в Москву';\n    resetLeg(OT,'outbound');\n    const out=document.getElementById('sumOut');\n    out.classList.remove('selected');\n    out.querySelector('.sum-body').innerHTML='<div class=\"rt\">Ташкент — Москва<\u002Fdiv><div class=\"st\">Рейс ещё не выбран<\u002Fdiv><div class=\"pr\"><span class=\"lab\">Тариф ещё не выбран<\u002Fspan><span class=\"amt\">от 5 000 000 UZS<\u002Fspan><\u002Fdiv>';\n    window.scrollTo({top:0,behavior:'smooth'});\n  }\n  function selectFare(flight,fareLabel,price){\n    if(!flight) return;\n    const pick=window._pick||{};\n    const sel={flight,fareLabel,price,nm:pick.nm,cls:pick.cls,cabin:pick.cabin||'economy'};\n    if(window.editing){\n      const which=window.editing; window.editing=null;\n      if(which==='out'){ window.outSel=sel; const out=document.getElementById('sumOut'); out.classList.add('selected'); out.querySelector('.sum-body').innerHTML=selSummary(flight,fareLabel); out.querySelector('.edit').addEventListener('click',backToOutbound); }\n      else{ window.retSel=sel; const ret=document.getElementById('sumRet'); ret.classList.add('selected'); ret.querySelector('.sum-body').innerHTML=selSummary(flight,fareLabel); }\n      openConfirm();\n      return;\n    }\n    if(window.leg==='outbound'){\n      window.outSel=sel;\n      const out=document.getElementById('sumOut');\n      out.classList.add('selected');\n      out.querySelector('.sum-body').innerHTML=selSummary(flight,fareLabel);\n      out.querySelector('.edit').addEventListener('click',backToOutbound);\n      goReturnLeg();\n    }else{\n      window.retSel=sel;\n      const ret=document.getElementById('sumRet');\n      ret.classList.add('selected');\n      ret.querySelector('.sum-body').innerHTML=selSummary(flight,fareLabel);\n      ret.querySelector('.edit').addEventListener('click',()=>{\n        ret.classList.remove('selected');\n        ret.querySelector('.sum-body').innerHTML='<div class=\"rt\">Москва — Ташкент<\u002Fdiv><div class=\"st\">Рейс ещё не выбран<\u002Fdiv><div class=\"pr\"><span class=\"lab\">Тариф ещё не выбран<\u002Fspan><span class=\"amt\">от 5 000 000 UZS<\u002Fspan><\u002Fdiv>';\n      });\n      window.scrollTo({top:0,behavior:'smooth'});\n      if(window.outSel) openConfirm();\n    }\n  }\n\n  // ================= Confirm (round-trip) modal =================\n  const _CABLBL={economy:'Эконом',business:'Бизнес'};\n  const _ORDER=['Акция','Saver','Lite','Smart','Comfort'];\n  const _BORDER=['PRO','ELITE'];\n  const _STEP={'Акция':400000,'Saver':300000,'Lite':350000,'Smart':500000}; // econ→next econ tier upcharge\n  const _crossSvg='<svg class=\"mk\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8b273e\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"/><\u002Fsvg>';\n  const _checkSvg='<svg class=\"mk\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1f7a4d\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"/><\u002Fsvg>';\n  function _parseUZS(s){ return parseInt(String(s).replace(/\\D/g,''),10)||0; }\n  function _findFare(cabin,nm){ return (FARES[cabin]||[]).find(f=>f.nm===nm)||null; }\n  function _upgradeOf(cabin,nm){\n    if(cabin==='economy'){\n      if(nm!=='Comfort'){ const g=_findFare('economy','Comfort'); if(g&&g.left) return {cabin:'economy',nm:'Comfort'}; }\n      return {cabin:'business',nm:'PRO'};\n    }\n    const j=_BORDER.indexOf(nm);\n    for(let k=j+1;k<_BORDER.length;k++){ const g=_findFare('business',_BORDER[k]); if(g&&g.left) return {cabin:'business',nm:_BORDER[k]}; }\n    return null;\n  }\n  function _seatVal(o){ return 'Бесплатный'; }\n  function _rank(v){ return v==='не разрешено'?0:(v==='бесплатно'?2:1); }\n  function _g(v,on){ return on?`<span class=\"better\">${v}<\u002Fspan>`:v; }\n  function _tierRows(arr,carr){\n    return (arr||[]).map((r,i)=>{ const v=r[1]; const cls=(v==='не разрешено')?'no':(v==='бесплатно'?'free':''); const b=carr&&carr[i]&&_rank(v)>_rank(carr[i][1]); return `<div class=\"cfd-tier\"><span class=\"tl\">${r[0]}<\u002Fspan><span class=\"tv ${cls}${b?' better':''}\">${v}<\u002Fspan><\u002Fdiv>`; }).join('');\n  }\n  function _lugRow(icon,label,o,co){\n    const cnt=o.cnt||'1 место';\n    const b=co!=null && o.ok;\n    const right = o.ok ? `<div class=\"cfd-rt\"><b>${_g(cnt,b)}<\u002Fb><span class=\"d\">${o.s||''}<\u002Fspan><\u002Fdiv>` : `<div class=\"cfd-rt\"><b>—<\u002Fb><span class=\"d\">за доплату<\u002Fspan><\u002Fdiv>`;\n    return `<div class=\"cfd-row\"><span class=\"cfd-ic\">${IC[icon]('#12174f')}<\u002Fspan><div class=\"cfd-mid\"><b>${label}<\u002Fb><span class=\"d\">${o.ok?o.t:'не включено'}<\u002Fspan><\u002Fdiv>${right}<\u002Fdiv>`;\n  }\n  function _valRow(icon,label,val,muted,better){\n    const cls=better?'val better':(muted?'sub':'val');\n    return `<div class=\"cfd-row\"><span class=\"cfd-ic\">${IC[icon]('#12174f')}<\u002Fspan><div class=\"cfd-mid\"><b>${label}<\u002Fb><\u002Fdiv><div class=\"cfd-rt ${cls}\">${val}<\u002Fdiv><\u002Fdiv>`;\n  }\n  function _tierBlock(icon,label,arr,carr){\n    return `<div class=\"cfd-row full\"><span class=\"cfd-ic\">${IC[icon]('#12174f')}<\u002Fspan><div class=\"cfd-tiers\"><div class=\"cfd-lab\">${label}<\u002Fdiv>${_tierRows(arr,carr)}<\u002Fdiv><\u002Fdiv>`;\n  }\n  function _upRow(val,better){\n    return `<div class=\"cfd-row\"><span class=\"cfd-ic\">${IC.up('#12174f')}<\u002Fspan><div class=\"cfd-mid\"><b>Апгрейд класса<\u002Fb><span class=\"d${better?' better':''}\">${val}<\u002Fspan><\u002Fdiv><\u002Fdiv>`;\n  }\n  function _cfDetail(f,cmp){\n    if(!f) return '';\n    const seatB = !!cmp;\n    const upB = cmp && f.up && f.up!=='нет' && f.up!==(cmp.up||'нет');\n    return `<div class=\"cfd-list\">${_lugRow('carryon','Ручная кладь',f.carryon,cmp&&cmp.carryon)}${_lugRow('bag','Багаж',f.bag,cmp&&cmp.bag)}${_valRow('seat','Выбор места',_seatVal(f.seat),false,seatB)}${_upRow(f.up||'нет',upB)}${_tierBlock('reiss','Переоформление',f.reiss,cmp&&cmp.reiss)}${_tierBlock('ref','Возврат',f.ref,cmp&&cmp.ref)}<\u002Fdiv>`;\n  }\n  function _stripMid(f){\n    const segs=f.segs, n=segs.length, t=s=>String(s).replace(/\\s*GMT[+-]\\d+/,'');\n    if(n<=1) return '<div class=\"cf-dur\">'+(f.total||'')+'<\u002Fdiv><div class=\"cf-bar\"><span class=\"cf-ln\"><\u002Fspan><\u002Fdiv><div class=\"cf-stops\">Без остановок<\u002Fdiv>';\n    let bar='<span class=\"cf-ln\"><\u002Fspan>';\n    for(let i=0;i<n-1;i++){ const sa=segs[i].to, sd=segs[i+1].from, ap=AP[sa.code]; bar+=`<span class=\"cf-mt\">${t(sa.time)}<\u002Fspan><div class=\"cf-stop\"><b>${ap.city.split(',')[0]}, ${sa.code}<\u002Fb><span>${(f.lay&&f.lay[i])||''}<\u002Fspan><\u002Fdiv><span class=\"cf-mt\">${t(sd.time)}<\u002Fspan><span class=\"cf-ln\"><\u002Fspan>`; }\n    return `<div class=\"cf-dur\">${f.total||''}<\u002Fdiv><div class=\"cf-bar\">${bar}<\u002Fdiv>`;\n  }\n  function _legHTML(sel,dir){\n    const f=sel.flight;\n    const fno=(f.segs[0]&&f.segs[0].no)||f.no||'';\n    const dep=f.segs[0].from, arr=f.segs[f.segs.length-1].to;\n    const depAP=AP[dep.code], arrAP=AP[arr.code];\n    const total=(f.total||'').replace('Общее время в пути ','');\n    const stops=f.segs.length>1?(f.segs.length-1)+' пересадка':'Без остановок';\n    const cur=_findFare(sel.cabin,sel.nm);\n    const upT=_upgradeOf(sel.cabin,sel.nm);\n    const up=upT?_findFare(upT.cabin,upT.nm):null;\n    let delta=0;\n    if(up){\n      delta=_parseUZS(up.price)-_parseUZS(cur?cur.price:sel.price);\n      if(delta<=0 && upT.cabin===sel.cabin && sel.cabin==='economy' && _STEP[sel.nm]!=null) delta=_STEP[sel.nm];\n    }\n    const t=s=>String(s).replace(/\\s*GMT[+-]\\d+/,'');\n    const head=dir==='out'\n      ? '<svg viewBox=\"0 0 24 24\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M8.20195 21.4995L10.102 21.4995L14.852 13.42 '); if(!pen) return;\n    const dir=pen.dataset.dir;\n    const sel=dir==='out'?window.outSel:window.retSel;\n    if(!sel){ closeConfirm(); return; }\n    window.editing=dir;\n    window.currentFlight=sel.flight;\n    closeConfirm();\n    openFareModal(sel.cabin);\n  });\n  // upgrade button → warn that the fare applies to all directions, then apply on confirm\n  const warnOv=document.getElementById('warnModal');\n  function openWarn(cabin,nm){\n    window._pendingUp={cabin,nm};\n    document.getElementById('warnFare').textContent=nm;\n    warnOv.hidden=false; document.body.style.overflow='hidden';\n  }\n  function closeWarn(){ warnOv.hidden=true; if(!cfov.hidden) document.body.style.overflow='hidden'; else document.body.style.overflow=''; }\n  function _applyFareTo(dir,cabin,nm){\n    const sel=dir==='out'?window.outSel:window.retSel;\n    if(!sel) return;\n    const nf=_findFare(cabin,nm);\n    sel.cabin=cabin; sel.nm=nm; sel.cls=nf?nf.cls:sel.cls; sel.price=nf?nf.price:sel.price;\n    sel.fareLabel=(nm+' '+(nf?nf.cls:'')).trim();\n    const sum=dir==='out'?document.getElementById('sumOut'):document.getElementById('sumRet');\n    if(sum){ sum.querySelector('.sum-body').innerHTML=selSummary(sel.flight,sel.fareLabel);\n      if(dir==='out'){ const ed=sum.querySelector('.edit'); if(ed) ed.addEventListener('click',backToOutbound); } }\n  }\n  cfov.addEventListener('click',e=>{\n    const up=e.target.closest('.cf-selbtn'); if(!up) return;\n    openWarn(up.dataset.upcabin, up.dataset.upnm);\n  });\n  document.getElementById('warnConfirm').addEventListener('click',()=>{\n    const p=window._pendingUp; if(!p){ closeWarn(); return; }\n    _applyFareTo('out',p.cabin,p.nm);\n    _applyFareTo('ret',p.cabin,p.nm);\n    closeWarn(); openConfirm();\n  });\n  document.getElementById('warnClose').addEventListener('click',closeWarn);\n  warnOv.addEventListener('click',e=>{ if(e.target===warnOv) closeWarn(); });\n  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&!cfov.hidden) closeConfirm(); });\n  window.outSel=null; window.retSel=null; window.leg='outbound';\n  window._pick={nm:'Lite',cls:'Class B',price:'4 500 000 UZS',cabin:'economy'};\n  selectFare(FLIGHTS[1],'Lite Class B','4 500 000 UZS');\n  window._pick={nm:'Saver',cls:'Class B',price:'4 500 000 UZS',cabin:'economy'};\n  selectFare(RFLIGHTS[0],'Saver Class B','4 500 000 UZS');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
